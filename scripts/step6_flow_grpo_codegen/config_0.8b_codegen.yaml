# Step 6: Flow-GRPO training config for Qwen3.5-0.8B on Code Generation (MBPP)
# Infrastructure identical to step5; only data paths and reward differ.

env:
  CUDA_VISIBLE_DEVICES: '0'
  HYDRA_FULL_ERROR: 1
  N_GPUS: 1
  BASE_MODEL: 'Qwen/Qwen3.5-0.8B'
  ROLLOUT_TP_SIZE: 1
  EXPERIMENT_NAME: 'AgentFlow_Qwen3.5-0.8B_Step6_CodeGen'
  PROJECT_NAME: 'AgentFlow_Step6'
  BASE_DATA_DIR: '/runs/step6/data'
  VERBOSITY: 'INFO'
  N_WORKERS: 8
  ENABLE_TOOLS: ["Python_Coder_Tool", "Base_Generator_Tool"]
  TOOL_ENGINE: ["vllm-@deepinfra/Qwen/Qwen2.5-7B-Instruct", "vllm-@deepinfra/Qwen/Qwen2.5-7B-Instruct"]
  MODEL_ENGINE: ["trainable", "vllm-@deepinfra/Qwen/Qwen2.5-7B-Instruct", "vllm-@deepinfra/Qwen/Qwen2.5-7B-Instruct", "vllm-@deepinfra/Qwen/Qwen2.5-7B-Instruct"]
  TOOL_STEPS: 3
  TEST_TEMPERATURE: 0.0
  TRAIN_TEMPERATURE: 0.7
  OUTPUT_TYPE: "direct"
  AGENT_MAX_TIMEOUT: 120
  REWARD_FUNCTION: "code_execution"

python_args:
  "+ray_init.num_cpus": 4
  agentflow.port: 9999
  algorithm.adv_estimator: 'grpo'

  data.train_files: '${BASE_DATA_DIR}/train/mbpp_train.parquet'
  data.val_files: '${BASE_DATA_DIR}/val/mbpp_val.parquet'
  data.trust_remote_code: True

  actor_rollout_ref.model.path: '${BASE_MODEL}'
  actor_rollout_ref.model.trust_remote_code: True
  actor_rollout_ref.rollout.tensor_model_parallel_size: '${ROLLOUT_TP_SIZE}'
  trainer.n_gpus_per_node: '${N_GPUS}'

  # LoRA (same as step5)
  actor_rollout_ref.model.lora_rank: 64
  actor_rollout_ref.model.lora_alpha: 128
  actor_rollout_ref.model.target_modules: 'all-linear'

  # Batch sizes (same as step5)
  data.train_batch_size: 8
  actor_rollout_ref.rollout.n: 4
  actor_rollout_ref.actor.ppo_mini_batch_size: 4
  actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu: 2
  actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu: 2
  actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu: 2

  actor_rollout_ref.rollout.multi_turn.format: 'hermes'
  data.max_prompt_length: 4096
  data.max_response_length: 1024
  data.truncation: 'truncate'

  # Optimization (same as step5)
  actor_rollout_ref.actor.optim.lr: 1e-5
  actor_rollout_ref.model.use_remove_padding: True
  actor_rollout_ref.actor.use_kl_loss: True
  actor_rollout_ref.actor.kl_loss_coef: 0.001
  actor_rollout_ref.actor.entropy_coeff: 0.0
  actor_rollout_ref.actor.clip_ratio_low: 0.2
  actor_rollout_ref.actor.clip_ratio_high: 0.3
  actor_rollout_ref.model.enable_gradient_checkpointing: True
  actor_rollout_ref.actor.fsdp_config.param_offload: False
  actor_rollout_ref.actor.fsdp_config.optimizer_offload: False

  "+actor_rollout_ref.model.override_config.attn_implementation": 'sdpa'

  # vLLM rollout (same as step5); weight sync after every update_actor() via _sync_weights_to_rollout()
  actor_rollout_ref.rollout.name: 'vllm'
  actor_rollout_ref.rollout.gpu_memory_utilization: 0.4
  actor_rollout_ref.rollout.enforce_eager: True
  actor_rollout_ref.rollout.max_model_len: 12288
  actor_rollout_ref.rollout.free_cache_engine: False
  actor_rollout_ref.rollout.load_format: 'auto'

  actor_rollout_ref.ref.fsdp_config.param_offload: False
  algorithm.use_kl_in_reward: False

  trainer.default_local_dir: '/runs/step6/checkpoints'
  trainer.critic_warmup: 0
  trainer.logger: ['console', 'wandb']
  trainer.project_name: '${PROJECT_NAME}'
  trainer.experiment_name: '${EXPERIMENT_NAME}'
  trainer.nnodes: 1
  trainer.save_freq: 2
  trainer.test_freq: 2
  trainer.total_epochs: 50
  trainer.val_before_train: False
  trainer.resume_mode: 'auto'
